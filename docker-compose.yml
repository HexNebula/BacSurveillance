services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: exam
      POSTGRES_PASSWORD: exam
      POSTGRES_DB: exam_surveillance
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://exam:exam@db:5432/exam_surveillance
    depends_on:
      - db
    volumes:
      - ./backend:/app

volumes:
  postgres_data:
